<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Note Manager</a>
        </div>
    </nav>
    <div class="container mt-5">
        <h1 class="mb-4">Notes</h1>
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Title</th>
                    <th>Content</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="note : ${notes}">
                    <td th:text="${note.title}"></td>
                    <td th:text="${note.content}"></td>
                    <td>
                        <a th:href="@{/note/edit(id=${note.id})}" class="btn btn-primary btn-sm">Edit</a>
                        <form th:action="@{/note/delete}" method="post" style="display:inline;">
                            <input type="hidden" th:name="id" th:value="${note.id}">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
